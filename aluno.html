<!DOCTYPE html>
<html>
<head>
  <title>Aluno</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎓 Confirmar Presença</h1>

  <div class="card">
    <input type="text" id="nome" placeholder="Seu nome">
    <br>
    <button onclick="validar()">Confirmar Presença</button>
    <p id="status"></p>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const codigo = urlParams.get("codigo");

    const salaLat = -23.561684;
    const salaLng = -46.625378;

    function validar() {
      const nome = document.getElementById("nome").value;

      if (!nome) {
        document.getElementById("status").innerText = "Digite seu nome";
        return;
      }

      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        const distancia = calcularDistancia(lat, lng, salaLat, salaLng);

        if (distancia < 0.1) {
          salvarPresenca(nome);
          document.getElementById("status").innerText = "✅ Presença confirmada";
        } else {
          document.getElementById("status").innerText = "❌ Fora da sala";
        }

      }, () => {
        document.getElementById("status").innerText = "Erro de localização";
      });
    }

    function salvarPresenca(nome) {
      let lista = JSON.parse(localStorage.getItem("presencas")) || [];

      if (!lista.includes(nome)) {
        lista.push(nome);
      }

      localStorage.setItem("presencas", JSON.stringify(lista));
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }
  </script>

</body>
</html>
