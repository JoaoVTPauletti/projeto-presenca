<!DOCTYPE html>
<html>
<head>
  <title>Aluno</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎓 Confirmar Presença</h1>

  <div class="card">
    <input type="text" id="nome" placeholder="Seu nome">
    <br><br>
    <button onclick="validar()">Confirmar Presença</button>

    <p id="status"></p>
    <p id="distancia"></p>

    <div style="margin-top:20px;">
      <div>📍 Sala</div>
      <div style="height:2px; background:#ccc; margin:5px 0;"></div>
      <div>👤 Você</div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const codigo = urlParams.get("codigo");

    function validar() {
      const nome = document.getElementById("nome").value;

      if (!nome) {
        document.getElementById("status").innerText = "Digite seu nome";
        return;
      }

      if (!codigo) {
        document.getElementById("status").innerText = "QR inválido";
        return;
      }

      navigator.geolocation.getCurrentPosition(async (pos) => {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        // 🔥 COLOCA SUA LOCALIZAÇÃO AQUI
        const salaLat = -22.456810;
        const salaLng = -48.965200;

        const distancia = calcularDistancia(lat, lng, salaLat, salaLng);

        // 🔥 MOSTRAR DISTÂNCIA
        document.getElementById("distancia").innerText =
          "📍 Distância da sala: " + (distancia * 1000).toFixed(0) + " metros";

        if (distancia < 0.3) {
          await salvarPresenca(nome);
          document.getElementById("status").innerText = "✅ Presença confirmada";
        } else {
          document.getElementById("status").innerText = "❌ Você não está na área";
        }

      }, () => {
        document.getElementById("status").innerText = "Permita a localização";
      });
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) *
        Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

      return R * c;
    }

    async function salvarPresenca(nome) {

      // delay aleatório pra evitar conflito
      await new Promise(r => setTimeout(r, Math.random() * 1000));

      const res = await fetch("https://api.jsonbin.io/v3/b/6a04ccaec0954111d81bf472/latest", {
        headers: {
          "X-Master-Key": "$2a$10$d7R2KUiNoHUW8lf/EU0.zu7mu9ylvKe/PT6KfonWzsOaSJ2fpSwWG"
        }
      });

      const data = await res.json();
      const listaAtual = data.record.presencas;

      listaAtual.push(nome);

      await fetch("https://api.jsonbin.io/v3/b/6a04ccaec0954111d81bf472", {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": "$2a$10$d7R2KUiNoHUW8lf/EU0.zu7mu9ylvKe/PT6KfonWzsOaSJ2fpSwWG"
        },
        body: JSON.stringify({
          presencas: listaAtual
        })
      });
    }
  </script>

</body>
</html>
