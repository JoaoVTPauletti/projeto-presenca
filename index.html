<!DOCTYPE html>
<html>
<head>
  <title>Professor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>📊 Controle de Presença</h1>

  <div class="card">
    <h3>QR Code da Aula</h3>
    <div id="qrcode"></div>
    <p>⏳ QR muda a cada 10 segundos</p>
  </div>

  <div class="card">
    <h3>Alunos Presentes</h3>
    <h4>Total: <span id="total">0</span></h4>
    <ul id="lista"></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

  <script>
    function gerarQR() {
      const codigoAtual = "AULA-" + Date.now();

      document.getElementById("qrcode").innerHTML = "";

      new QRCode(document.getElementById("qrcode"), {
        text: "https://joaovtpauletti.github.io/projeto-presenca/aluno.html?codigo=" + codigoAtual,
        width: 300,
        height: 300
      });
    }

    async function atualizarLista() {
      const res = await fetch("https://api.jsonbin.io/v3/b/6a04ccaec0954111d81bf472/latest", {
        headers: {
          "X-Master-Key": "$2a$10$d7R2KUiNoHUW8lf/EU0.zu7mu9ylvKe/PT6KfonWzsOaSJ2fpSwWG"
        }
      });

      const data = await res.json();
      const lista = data.record.presencas;

      const ul = document.getElementById("lista");
      ul.innerHTML = "";

      lista.forEach(nome => {
        const li = document.createElement("li");
        li.innerText = nome + " ✔️";
        ul.appendChild(li);
      });

      document.getElementById("total").innerText = lista.length;
    }

    setInterval(gerarQR, 10000);
    setInterval(atualizarLista, 2000);

    gerarQR();
  </script>

</body>
</html>
